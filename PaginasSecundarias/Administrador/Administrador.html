<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        body{
            background-color: #0f172a;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }
      .centrarContenido {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      h1 {
        font-size: 2.5vw;
        color: white;
      }
      .botonesAdmin {
        display: flex;
        justify-content: center;
        gap: 40px;
      }

      a{
        padding-inline: 30px;
        padding-block: 15px;
        border-radius: 10px;
        text-decoration: none;
      }
      .inscripcionBoton{
        background-color: #f9a146;
        color: white;
      }
      .eventosBoton{
        background-color: rebeccapurple;
        color: white;

      }
    </style>
  </head>
  <body>
    <div class="centrarContenido">
      <h1>Bienvenido al menu de administrador</h1>
      <div class="botonesAdmin">
        <a href="Inscripciones/inscripcion.xml" class="inscripcionBoton"
          >Ver inscripciones</a
        >
        <a href="GestorEventos/GestorEventos.html" class="eventosBoton"
          >Gestionar eventos</a
        >
      </div>
    </div>
  </body>
</html>
